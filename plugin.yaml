name: pdf
version: 0.4.0
description: >
  Import text-extractable PDF files into the knowledge store.
  Emits one markdown file per PDF when extracted text meets the minimum
  character threshold. Silently skips scanned-only PDFs (no text layer)
  so that zkm-scan can process them later.

creates_dirs:
  - pdfs
  - originals/pdfs
  - inbox/pdfs

config:
  source_dir:
    required: false
    default: ""
    description: >
      Optional directory to scan recursively for PDF files (.pdf). Read-only.
      When empty, only PDFs already in the store inbox (deposited by zkm-eml
      or other plugins) are processed.
  pdf_text_threshold:
    required: false
    default: 100
    description: >
      Minimum number of extracted characters required to classify a PDF as
      text-extractable (as opposed to scanned-only). PDFs below this threshold
      are logged to <store>/.zkm-state/zkm-pdf-skipped.jsonl and left for
      zkm-scan to OCR. Uses the same semantics as zkm-scan (stripped per-page
      character counts via zkm.pdftext) so both plugins agree on routing.
      Shared with zkm-scan — set once at the top level to govern both plugins.
  min_text_chars:
    required: false
    default: 100
    description: >
      DEPRECATED alias for pdf_text_threshold (id:cd59). Honoured for one
      release when pdf_text_threshold is absent; prefer pdf_text_threshold in
      new configs.
